name: AEGIS X CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    - name: Run RAG indexer check
      run: |
        python -m backend.app.rag_indexer

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-python@v4 # Wait, setup-node is standard for node.js
      # Let's fix this step to use standard node.js actions setup
    - uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package.json
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    - name: Run build compilation check
      run: |
        cd frontend
        npm run build
