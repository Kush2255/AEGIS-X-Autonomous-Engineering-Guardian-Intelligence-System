services:
  - type: web
    name: aegis-x-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt && python -m backend.app.rag_indexer"
    startCommand: "python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
